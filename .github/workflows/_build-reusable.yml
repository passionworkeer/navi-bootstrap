name: Reusable Build (SLSA L3)

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string



permissions: {}

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b  # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v5.4.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install release tools
        run: uv pip install cyclonedx-bom==7.2.2 pip-licenses==5.5.1

      - name: Run test suite
        run: uv run pytest tests/ -x -q

      - name: Generate SBOM (CycloneDX)
        run: uv run cyclonedx-py environment --output-format json -o sbom.cdx.json

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0.23.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate license report
        run: |
          uv run pip-licenses --format=csv --with-urls --with-authors --output-file licenses.csv
          uv run pip-licenses --format=plain-vertical --with-urls --with-authors --output-file licenses.txt

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72  # v4.7.1
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Fallback for empty release notes
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [ ! -s release-notes.md ]; then
            echo "Release ${TAG_NAME}" > release-notes.md
          fi

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file release-notes.md \
            dist/* \
            sbom.cdx.json \
            sbom.spdx.json \
            licenses.csv \
            licenses.txt

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            dist/*
            sbom.cdx.json
            sbom.spdx.json
            licenses.csv
            licenses.txt

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/
