# ──────────────────────────────────────────────
# Edit these lines for your project
# ──────────────────────────────────────────────
[project]
name = "navi-bootstrap"
site_name = "navi-bootstrap"
description = "Spec-driven Jinja2 engine and template packs for bootstrapping projects"
site_url = "https://project-navi.github.io/navi-bootstrap"
repo_url = "https://github.com/Project-Navi/navi-bootstrap"
repo_name = "Project-Navi/navi-bootstrap"
copyright = "Copyright 2026 Nelson Spence"
extra_css = ["stylesheets/navi.css"]
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

# ──────────────────────────────────────────────
# Edit nav to match your docs structure
# ──────────────────────────────────────────────
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Quickstart" = "getting-started/quickstart.md"},
  ]},
  {"Explanation" = [
    {"Architecture" = "explanation/architecture.md"},
    {"Security Model" = "explanation/security-model.md"},
  ]},
  {"How-To" = [
    {"Contributing" = "how-to/contributing.md"},
  ]},
  {"Reference" = [
    {"CLI Reference" = "reference/cli.md"},
    {"Pack Catalog" = "reference/packs.md"},
    {"Changelog" = "reference/changelog.md"},
  ]},
]

# ──────────────────────────────────────────────
# Everything below is shared brand config
# You should not need to change these
# ──────────────────────────────────────────────
[project.theme]
logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.palette]
scheme = "slate"

[project.theme.features]
navigation_sections = true
navigation_expand = true
navigation_top = true
content_code_copy = true
toc_integrate = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.plugins.search]
